<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixelkari — ਪਿਕਸਲਕਾਰੀ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111;
      --sidebar: #181818;
      --border: #2c2c2c;
      --text: #e8ddd0;
      --muted: #6b6258;
      --accent: #c8a86b;
      --accent-dim: rgba(200,168,107,0.12);
    }
    html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; }
    body { font-family: 'Bricolage Grotesque', sans-serif; color: var(--text); font-size: 13px; }

    #app { display: flex; height: 100vh; width: 100vw; }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 256px; min-width: 256px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow-y: auto; overflow-x: hidden;
    }
    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .s-head {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    .s-title { font-size: 14px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); }
    .s-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: 0.06em; }

    .section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .sec-label {
      font-size: 9px; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 9px;
    }

    .btn-group { display: flex; gap: 4px; }
    .tbtn {
      flex: 1; padding: 7px 4px;
      background: #222; border: 1px solid var(--border); border-radius: 5px;
      color: var(--text); cursor: pointer; font-size: 11px; font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 500; letter-spacing: 0.04em; text-align: center; transition: all 0.12s;
    }
    .tbtn:hover { background: #2a2a2a; }
    .tbtn.on { background: var(--accent); color: #111; border-color: var(--accent); }

    /* color swatches */
    .color-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
    .swatch {
      aspect-ratio: 1; border-radius: 3px; cursor: pointer;
      border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s;
    }
    .swatch:hover { transform: scale(1.15); z-index: 1; position: relative; }
    .swatch.on { border-color: #fff; }

    /* base colors */
    .base-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .base-sw {
      height: 26px; border-radius: 4px; cursor: pointer;
      border: 2px solid transparent; transition: border-color 0.12s;
    }
    .base-sw:hover { opacity: 0.8; }
    .base-sw.on { border-color: var(--accent); }

    /* symmetry */
    .sym-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }

    /* toggles */
    .tog-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .tog-row:last-child { margin-bottom: 0; }
    .tog-label { font-size: 11px; color: var(--text); opacity: 0.7; }
    .toggle {
      width: 30px; height: 17px; background: #333;
      border-radius: 9px; position: relative; cursor: pointer;
      border: none; transition: background 0.2s; flex-shrink: 0;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: ''; position: absolute; width: 11px; height: 11px;
      background: #fff; border-radius: 50%; top: 3px; left: 3px;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(13px); }

    /* zoom + undo row */
    .view-row { display: flex; align-items: center; gap: 5px; }
    .icon-btn {
      width: 26px; height: 26px; background: #222;
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); cursor: pointer; display: flex;
      align-items: center; justify-content: center; font-size: 14px;
      font-family: 'Inter', sans-serif; transition: background 0.1s; flex-shrink: 0;
    }
    .icon-btn:hover { background: #2a2a2a; }
    .zoom-lbl { font-size: 11px; color: var(--muted); min-width: 34px; text-align: center; }
    .fit-btn  { width: auto; padding: 0 8px; font-size: 10px; font-weight: 500; }
    .undo-btn {
      padding: 5px 10px; background: #222;
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); cursor: pointer; font-size: 10px;
      font-family: 'Bricolage Grotesque', sans-serif; font-weight: 500; letter-spacing: 0.04em;
      transition: background 0.1s; white-space: nowrap;
    }
    .undo-btn:hover { background: #2a2a2a; }
    .undo-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

    /* motif palette */
    .motif-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 6px; }
    .motif-thumb {
      position: relative; cursor: pointer; border-radius: 5px; overflow: hidden;
      border: 2px solid var(--border); transition: border-color 0.12s;
    }
    .motif-thumb:hover { border-color: var(--accent); }
    .motif-thumb canvas { display: block; width: 100%; aspect-ratio: 1; }
    .motif-thumb .m-del {
      position: absolute; top: 2px; right: 2px; width: 14px; height: 14px;
      background: rgba(0,0,0,0.7); border: none; color: #aaa; cursor: pointer;
      border-radius: 2px; font-size: 10px; line-height: 1; padding: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.1s;
    }
    .motif-thumb:hover .m-del { opacity: 1; }
    .motif-thumb .m-lbl {
      font-size: 9px; color: var(--muted); text-align: center;
      padding: 2px 0 3px; background: var(--sidebar);
    }
    .save-motif-btn {
      width: 100%; padding: 6px; background: transparent;
      border: 1px dashed var(--border); border-radius: 5px;
      color: var(--muted); cursor: pointer; font-size: 10px;
      font-family: 'Bricolage Grotesque', sans-serif; letter-spacing: 0.06em;
      transition: border-color 0.12s, color 0.12s;
    }
    .save-motif-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* footer */
    .s-foot {
      padding: 14px 16px; margin-top: auto;
      border-top: 1px solid var(--border);
    }
    .export-btn {
      width: 100%; padding: 9px;
      background: transparent; border: 1px solid var(--accent);
      border-radius: 5px; color: var(--accent); cursor: pointer;
      font-size: 11px; font-family: 'Inter', sans-serif; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase; transition: background 0.15s;
    }
    .export-btn:hover { background: var(--accent-dim); }

    /* ── CANVAS AREA ── */
    #canvas-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      overflow: hidden; background: #0d0d0d; position: relative;
    }
    #canvas-wrap { position: relative; transform-origin: center center; transition: transform 0.15s; }
    #canvas-wrap canvas { display: block; cursor: crosshair; }

    /* hint bar */
    #hint {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.72); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 14px; font-size: 11px; color: var(--muted);
      pointer-events: none; opacity: 0; transition: opacity 0.25s; white-space: nowrap;
    }
    #hint.on { opacity: 1; }

    /* ── MODAL ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 200;
      align-items: center; justify-content: center; backdrop-filter: blur(4px);
    }
    .overlay.on { display: flex; }
    .modal {
      background: #1a1a1a; border: 1px solid var(--border);
      border-radius: 10px; padding: 24px; width: 380px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .modal h3 { font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
    .mfield label { display: block; font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .mfield input, .mfield textarea {
      width: 100%; background: #222; border: 1px solid var(--border);
      border-radius: 5px; color: var(--text); padding: 8px 10px;
      font-size: 13px; font-family: 'Bricolage Grotesque', sans-serif; resize: none;
      transition: border-color 0.12s;
    }
    .mfield input:focus, .mfield textarea:focus { outline: none; border-color: var(--accent); }
    .mfield textarea { height: 72px; }
    .m-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-sec {
      padding: 8px 16px; background: transparent; border: 1px solid var(--border);
      border-radius: 5px; color: var(--muted); cursor: pointer;
      font-size: 12px; font-family: 'Bricolage Grotesque', sans-serif; transition: border-color 0.12s;
    }
    .btn-sec:hover { border-color: var(--muted); }
    .btn-pri {
      padding: 8px 18px; background: var(--accent); border: 1px solid var(--accent);
      border-radius: 5px; color: #111; cursor: pointer; font-size: 12px;
      font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600;
    }
    .btn-pri:hover { opacity: 0.9; }
  </style>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="s-head">
      <div class="s-title">Pixelkari</div>
      <div class="s-sub">ਪਿਕਸਲਕਾਰੀ</div>
    </div>

    <div class="section">
      <div class="sec-label">View</div>
      <div class="view-row" style="margin-bottom:6px;">
        <button class="icon-btn" onclick="doZoom(-0.25)">−</button>
        <span class="zoom-lbl" id="zoom-lbl">100%</span>
        <button class="icon-btn" onclick="doZoom(0.25)">+</button>
        <button class="icon-btn fit-btn" onclick="fitZoom()">Fit</button>
      </div>
      <div class="view-row">
        <button class="undo-btn" id="undo-btn" onclick="undo()" disabled style="flex:1;">↩ Undo</button>
        <button class="undo-btn" onclick="randomise()" style="flex:1;">⟳ Randomise</button>
        <button class="undo-btn" onclick="clearCanvas()" style="flex:1; color:#c46060;">✕ Clear</button>
      </div>
    </div>

    <div class="section">
      <div class="sec-label">Draw your pattern</div>
      <div class="btn-group" id="tool-group">
        <button class="tbtn on" data-tool="paint">Draw</button>
        <button class="tbtn"    data-tool="erase">Erase</button>
      </div>
    </div>

    <div class="section">
      <div class="sec-label">Mirror Pattern</div>
      <div class="sym-grid" id="sym-group"></div>
    </div>

    <div class="section">
      <div class="sec-label">Grid</div>
      <div class="tog-row">
        <span class="tog-label">Show Grid</span>
        <button class="toggle on" id="tog-grid" onclick="toggleGrid()"></button>
      </div>
    </div>

    <div class="section">
      <div class="sec-label">Base Colour</div>
      <div class="base-grid" id="base-pal"></div>
    </div>

    <div class="section">
      <div class="sec-label">Thread Colour</div>
      <div class="color-grid" id="thread-pal"></div>
    </div>

    <div class="section">
      <div class="sec-label">Pre-made Motifs</div>
      <button class="save-motif-btn" onclick="saveAsMotif()">+ Save current drawing as motif</button>
      <div class="motif-grid" id="motif-pal"></div>
    </div>

    <div class="s-foot">
      <button class="export-btn" onclick="openModal()">↓ Download Postcard</button>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-area">
    <div id="canvas-wrap">
      <canvas id="mc"></canvas>
    </div>
    <div id="hint"></div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="overlay" id="modal">
  <div class="modal">
    <h3>Download Postcard</h3>
    <div class="mfield">
      <label>Your Name</label>
      <input type="text" id="exp-name" placeholder="e.g. Anahat" maxlength="50" />
    </div>
    <div class="mfield">
      <label>Message</label>
      <textarea id="exp-msg" placeholder="A short note, occasion, or dedication..."></textarea>
    </div>
    <div class="m-actions">
      <button class="btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn-pri" onclick="downloadPostcard()">Download PNG</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const CELL   = 12;
const RATIO  = 2;    // 2:1 canvas ratio
const BORDER = 9;    // fixed 9-cell border zone width
const MAX_H  = 60;

const THREAD = [
  '#F5C518','#F0920A','#E8521A','#D93030',
  '#D93068','#E040A0','#E080C0','#F0B0D0',
  '#FFFFFF','#C8DC40','#40C070','#28B8B8',
  '#48A8F0','#4848E0','#8840D0','#F0D890',
];

const BASES = [
  { hex:'#8B0E1A', label:'Red'    },
  { hex:'#5C0A15', label:'Maroon' },
  { hex:'#141414', label:'Black'  },
  { hex:'#08183A', label:'Navy'   },
  { hex:'#0A2818', label:'Forest' },
  { hex:'#180830', label:'Plum'   },
];

const SYMS = [
  { id:'none', label:'None' },
  { id:'h',    label:'H'    },
  { id:'v',    label:'V'    },
  { id:'4',    label:'4×'   },
  { id:'8',    label:'8×'   },
];

// ═══════════════════════════════════════════════════
// MOTIFS (persisted to localStorage)
// ═══════════════════════════════════════════════════
let MOTIFS = [];
try { const d = localStorage.getItem('pkMotifs'); if (d) MOTIFS = JSON.parse(d); } catch(e) {}

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const S = {
  tool:      'paint',
  color:     THREAD[0],
  base:      BASES[0].hex,
  sym:       'none',
  grid:      true,
  zoom:      1,
  panX:      0,
  panY:      0,
  cols:      0,
  rows:      0,
  cells:     {},
  history:   [],
  drawing:   false,
  panning:   false,
  spaceDown: false,
  panStart:  null,
  lastCell:  null,
};

// ═══════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('mc');
const ctx    = canvas.getContext('2d');

function initCanvas() {
  const area = document.getElementById('canvas-area');
  const dpr  = window.devicePixelRatio || 1;
  const aw = area.clientWidth  - 48;
  const ah = area.clientHeight - 48;
  let cw, ch;
  if (aw / RATIO <= ah) { cw = aw; ch = Math.floor(aw / RATIO); }
  else                  { ch = ah; cw = Math.floor(ah * RATIO);  }

  S.cols = Math.floor(cw / CELL);
  S.rows = Math.floor(ch / CELL);
  const logW = S.cols * CELL;
  const logH = S.rows * CELL;
  canvas.width  = logW * dpr;
  canvas.height = logH * dpr;
  canvas.style.width  = logW + 'px';
  canvas.style.height = logH + 'px';
  ctx.scale(dpr, dpr);
  render();
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function isInner(col, row) {
  return col >= BORDER && col < S.cols - BORDER &&
         row >= BORDER && row < S.rows - BORDER;
}

function render() {
  const W   = S.cols * CELL;   // logical pixels
  const H   = S.rows * CELL;
  const bpx = BORDER * CELL;

  // Outer border zone — base colour brightened
  ctx.fillStyle = S.base;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.14)';
  ctx.fillRect(0, 0, W, H);

  // Inner painting zone — base colour darkened
  ctx.fillStyle = S.base;
  ctx.fillRect(bpx, bpx, W - bpx * 2, H - bpx * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.30)';
  ctx.fillRect(bpx, bpx, W - bpx * 2, H - bpx * 2);

  // painted triangles
  for (const [key, color] of Object.entries(S.cells)) {
    const parts = key.split(',');
    drawTriangle(+parts[0], +parts[1], parts[2], color);
  }

  if (S.grid) drawGrid();
}

function drawGrid() {
  const W = S.cols * CELL;
  const H = S.rows * CELL;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth   = 0.5;

  // H + V lines in one path
  ctx.beginPath();
  for (let c = 0; c <= S.cols; c++) { ctx.moveTo(c*CELL, 0); ctx.lineTo(c*CELL, H); }
  for (let r = 0; r <= S.rows; r++) { ctx.moveTo(0, r*CELL); ctx.lineTo(W, r*CELL); }
  ctx.stroke();

  // diagonals in one path
  ctx.beginPath();
  for (let c = 0; c < S.cols; c++) {
    for (let r = 0; r < S.rows; r++) {
      const x = c*CELL, y = r*CELL;
      ctx.moveTo(x,      y);      ctx.lineTo(x+CELL, y+CELL);
      ctx.moveTo(x+CELL, y);      ctx.lineTo(x,      y+CELL);
    }
  }
  ctx.stroke();

  ctx.restore();
}

// ═══════════════════════════════════════════════════
// UNDO
// ═══════════════════════════════════════════════════
function snap() {
  S.history.push(JSON.stringify(S.cells));
  if (S.history.length > MAX_H) S.history.shift();
  document.getElementById('undo-btn').disabled = false;
}

function undo() {
  if (!S.history.length) return;
  S.cells = JSON.parse(S.history.pop());
  document.getElementById('undo-btn').disabled = S.history.length === 0;
  render();
}

function randomise() {
  snap();
  for (const key of Object.keys(S.cells)) {
    S.cells[key] = THREAD[Math.floor(Math.random() * THREAD.length)];
  }
  render();
}

function clearCanvas() {
  if (!Object.keys(S.cells).length) return;
  snap();
  S.cells = {};
  render();
}

// ═══════════════════════════════════════════════════
// PAINTING
// ═══════════════════════════════════════════════════
function triAt(e) {
  const rect = canvas.getBoundingClientRect();
  // divide by zoom: getBoundingClientRect returns scaled dimensions,
  // so we convert back to the canvas's own logical pixel space
  const px   = (e.clientX - rect.left) / S.zoom;
  const py   = (e.clientY - rect.top)  / S.zoom;
  const col  = Math.floor(px / CELL);
  const row  = Math.floor(py / CELL);
  const u    = (px - col * CELL) / CELL;
  const v    = (py - row * CELL) / CELL;
  let tri;
  if      (v < u  && v < 1-u) tri = 't';
  else if (v > u  && v > 1-u) tri = 'b';
  else if (u >= v && u >= 1-v) tri = 'r';
  else                         tri = 'l';
  return { col, row, tri };
}

function drawTriangle(c, r, tri, color) {
  const x = c * CELL, y = r * CELL;
  const mx = x + CELL / 2, my = y + CELL / 2;
  ctx.fillStyle = color;
  ctx.beginPath();
  if      (tri === 't') { ctx.moveTo(x,        y);        ctx.lineTo(x+CELL, y);        ctx.lineTo(mx, my); }
  else if (tri === 'r') { ctx.moveTo(x+CELL,   y);        ctx.lineTo(x+CELL, y+CELL);   ctx.lineTo(mx, my); }
  else if (tri === 'b') { ctx.moveTo(x+CELL,   y+CELL);   ctx.lineTo(x,      y+CELL);   ctx.lineTo(mx, my); }
  else                  { ctx.moveTo(x,         y+CELL);   ctx.lineTo(x,      y);        ctx.lineTo(mx, my); }
  ctx.closePath();
  ctx.fill();
}

// Triangle transforms for symmetry
function triFlip(tri, flipH, flipV) {
  if (flipH) tri = tri === 'l' ? 'r' : tri === 'r' ? 'l' : tri;
  if (flipV) tri = tri === 't' ? 'b' : tri === 'b' ? 't' : tri;
  return tri;
}

function symTris(col, row, tri) {
  const cx = S.cols / 2, cy = S.rows / 2;
  const dx = col - cx,   dy = row - cy;
  const clamp = (c, r) => { c = Math.round(c); r = Math.round(r); return c>=0&&c<S.cols&&r>=0&&r<S.rows ? [c,r] : null; };
  const res = [{col, row, tri}];

  if (S.sym === 'h' || S.sym === '4' || S.sym === '8') {
    const p = clamp(cx-dx, row);
    if (p) res.push({col:p[0], row:p[1], tri:triFlip(tri, true, false)});
  }
  if (S.sym === 'v' || S.sym === '4' || S.sym === '8') {
    const p = clamp(col, cy-dy);
    if (p) res.push({col:p[0], row:p[1], tri:triFlip(tri, false, true)});
  }
  if (S.sym === '4' || S.sym === '8') {
    const p = clamp(cx-dx, cy-dy);
    if (p) res.push({col:p[0], row:p[1], tri:triFlip(tri, true, true)});
  }
  if (S.sym === '8') {
    // diagonal transpose: top↔left, right↔bottom
    const T = {t:'l',l:'t',r:'b',b:'r'};
    // 90° CCW: t→l→b→r→t
    const CCW = {t:'l',l:'b',b:'r',r:'t'};
    // 90° CW: t→r→b→l→t
    const CW  = {t:'r',r:'b',b:'l',l:'t'};
    // anti-diagonal: top↔right, bottom↔left
    const AD  = {t:'r',r:'t',b:'l',l:'b'};
    [[cx+dy, cy+dx, T[tri]],
     [cx-dy, cy+dx, CCW[tri]],
     [cx+dy, cy-dx, CW[tri]],
     [cx-dy, cy-dx, AD[tri]]].forEach(([nc, nr, nt]) => {
      const p = clamp(nc, nr); if (p) res.push({col:p[0], row:p[1], tri:nt});
    });
  }
  return res;
}

function paint(col, row, tri) {
  if (!isInner(col, row)) return;
  symTris(col, row, tri).forEach(({col: c, row: r, tri: t}) => {
    if (!isInner(c, r)) return;
    const key = `${c},${r},${t}`;
    if (S.tool === 'erase') { delete S.cells[key]; }
    else                    { S.cells[key] = S.color; }
  });
}

// ═══════════════════════════════════════════════════
// CANVAS EVENTS
// ═══════════════════════════════════════════════════
canvas.addEventListener('mousedown', e => {
  if (S.spaceDown || e.button === 1) {
    e.preventDefault();
    S.panning  = true;
    S.panStart = { x: e.clientX - S.panX, y: e.clientY - S.panY };
    canvas.style.cursor = 'grabbing';
    return;
  }
  snap();
  S.drawing = true;
  const {col, row, tri} = triAt(e);
  S.lastCell = {col, row, tri};
  paint(col, row, tri);
  render();
});

canvas.addEventListener('mousemove', e => {
  if (!S.drawing) return;
  const {col, row, tri} = triAt(e);
  if (S.lastCell?.col === col && S.lastCell?.row === row && S.lastCell?.tri === tri) return;
  S.lastCell = {col, row, tri};
  paint(col, row, tri);
  render();
});

canvas.addEventListener('mouseup',    () => { S.drawing = false; });
canvas.addEventListener('mouseleave', () => { S.drawing = false; });

// Pan continues even when mouse leaves canvas — handled at document level
document.addEventListener('mousemove', e => {
  if (!S.panning) return;
  S.panX = e.clientX - S.panStart.x;
  S.panY = e.clientY - S.panStart.y;
  applyTransform(false);
});
document.addEventListener('mouseup', () => {
  if (!S.panning) return;
  S.panning = false;
  canvas.style.cursor = S.spaceDown ? 'grab' : 'crosshair';
});

// ═══════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════
function applyTransform(animate) {
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.transition = animate ? 'transform 0.15s' : 'none';
  wrap.style.transform  = `translate(${S.panX}px, ${S.panY}px) scale(${S.zoom})`;
}
function doZoom(d) {
  S.zoom = Math.max(0.25, Math.min(4, +(S.zoom + d).toFixed(2)));
  applyTransform(true);
  document.getElementById('zoom-lbl').textContent = Math.round(S.zoom * 100) + '%';
}
function fitZoom() {
  S.zoom = 1; S.panX = 0; S.panY = 0;
  applyTransform(true);
  document.getElementById('zoom-lbl').textContent = '100%';
}

// ═══════════════════════════════════════════════════
// GRID TOGGLES
// ═══════════════════════════════════════════════════
function toggleGrid() {
  S.grid = !S.grid;
  document.getElementById('tog-grid').classList.toggle('on', S.grid);
  render();
}

// ═══════════════════════════════════════════════════
// EXPORT / POSTCARD
// ═══════════════════════════════════════════════════
function openModal()  { document.getElementById('modal').classList.add('on'); }
function closeModal() { document.getElementById('modal').classList.remove('on'); }

function downloadPostcard() {
  const name = document.getElementById('exp-name').value.trim();
  const msg  = document.getElementById('exp-msg').value.trim();

  const PAD  = 52, BOT = 110;
  const DW   = canvas.width, DH = canvas.height;
  const pcW  = DW + PAD * 2;
  const pcH  = DH + PAD + BOT;

  const exp  = document.createElement('canvas');
  exp.width  = pcW; exp.height = pcH;
  const ec   = exp.getContext('2d');

  // white card
  ec.fillStyle = '#FFFFFF';
  ec.fillRect(0, 0, pcW, pcH);

  // outer border
  ec.strokeStyle = '#E2D8C8'; ec.lineWidth = 1;
  ec.strokeRect(14, 14, pcW - 28, pcH - 28);

  // inner frame around dupatta
  ec.strokeStyle = '#D0C0A0'; ec.lineWidth = 1;
  ec.strokeRect(PAD - 5, PAD - 5, DW + 10, DH + 10);

  // render dupatta without grid
  const savedGrid = S.grid;
  S.grid = false;
  render();
  ec.drawImage(canvas, PAD, PAD);
  S.grid = savedGrid;
  render();

  // divider
  ec.strokeStyle = '#D0C0A0'; ec.lineWidth = 0.75;
  ec.beginPath(); ec.moveTo(PAD, DH + PAD + 22); ec.lineTo(DW + PAD, DH + PAD + 22); ec.stroke();

  // branding — bottom left
  ec.fillStyle = '#6B3D1E';
  ec.font = 'bold 13px Georgia, serif';
  ec.textAlign = 'left';
  ec.fillText('PIXELKARI', PAD, DH + PAD + 48);
  ec.fillStyle = '#B8986A';
  ec.font = '400 11px Georgia, serif';
  ec.fillText('ਪਿਕਸਲਕਾਰੀ', PAD, DH + PAD + 66);

  // message + name — bottom right
  if (msg) {
    ec.fillStyle = '#444';
    ec.font = '400 12px Georgia, serif';
    ec.textAlign = 'right';
    ec.fillText(msg, DW + PAD, DH + PAD + 48);
  }
  if (name) {
    ec.fillStyle = '#999';
    ec.font = '400 11px sans-serif';
    ec.textAlign = 'right';
    ec.fillText('— ' + name, DW + PAD, DH + PAD + 66);
  }

  const a = document.createElement('a');
  a.download = 'digi-phulkari.png';
  a.href = exp.toDataURL('image/png');
  a.click();
  closeModal();
}

// ═══════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === ' ') {
    e.preventDefault();
    if (!S.spaceDown) { S.spaceDown = true; canvas.style.cursor = 'grab'; }
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'z') { e.preventDefault(); undo(); return; }
  if (e.key === 'p') setTool('paint');
  if (e.key === 'e') setTool('erase');
  if (e.key === 'g') toggleGrid();
  if (e.key === '+' || e.key === '=') doZoom(0.25);
  if (e.key === '-') doZoom(-0.25);
  if (e.key === '0') fitZoom();
});
document.addEventListener('keyup', e => {
  if (e.key === ' ') {
    S.spaceDown = false;
    if (!S.panning) canvas.style.cursor = 'crosshair';
  }
});

// ═══════════════════════════════════════════════════
// BUILD UI
// ═══════════════════════════════════════════════════
function setTool(id) {
  S.tool = id;
  document.querySelectorAll('#tool-group .tbtn').forEach(b => b.classList.toggle('on', b.dataset.tool === id));
}

function buildTools() {
  document.querySelectorAll('#tool-group .tbtn').forEach(b => b.addEventListener('click', () => setTool(b.dataset.tool)));
}

function buildThreadPal() {
  const el = document.getElementById('thread-pal');
  THREAD.forEach(hex => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (hex === S.color ? ' on' : '');
    sw.style.background = hex; sw.title = hex;
    sw.addEventListener('click', () => {
      S.color = hex;
      document.querySelectorAll('#thread-pal .swatch').forEach(s => s.classList.remove('on'));
      sw.classList.add('on');
    });
    el.appendChild(sw);
  });
}

function buildBasePal() {
  const el = document.getElementById('base-pal');
  BASES.forEach(b => {
    const sw = document.createElement('div');
    sw.className = 'base-sw' + (b.hex === S.base ? ' on' : '');
    sw.style.background = b.hex; sw.title = b.label;
    sw.addEventListener('click', () => {
      S.base = b.hex;
      document.querySelectorAll('#base-pal .base-sw').forEach(s => s.classList.remove('on'));
      sw.classList.add('on');
      render();
    });
    el.appendChild(sw);
  });
}

function buildSym() {
  const el = document.getElementById('sym-group');
  SYMS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'tbtn' + (s.id === S.sym ? ' on' : '');
    btn.textContent = s.label;
    btn.addEventListener('click', () => {
      S.sym = s.id;
      document.querySelectorAll('#sym-group .tbtn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
    });
    el.appendChild(btn);
  });
}

function showHint(msg) {
  const el = document.getElementById('hint');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('on'), 3500);
}

// ═══════════════════════════════════════════════════
// MOTIF SAVE / STAMP / PALETTE
// ═══════════════════════════════════════════════════
function saveAsMotif() {
  const innerKeys = Object.keys(S.cells).filter(k => {
    const p = k.split(','); return isInner(+p[0], +p[1]);
  });
  if (!innerKeys.length) { showHint('Draw something in the inner zone first'); return; }

  const cs = innerKeys.map(k => +k.split(',')[0]);
  const rs = innerKeys.map(k => +k.split(',')[1]);
  const cx = (Math.min(...cs) + Math.max(...cs)) / 2;
  const cy = (Math.min(...rs) + Math.max(...rs)) / 2;

  const cells = {};
  for (const [key, color] of Object.entries(S.cells)) {
    const p = key.split(',');
    if (!isInner(+p[0], +p[1])) continue;
    cells[`${+p[0]-cx},${+p[1]-cy},${p[2]}`] = color;
  }

  const name = `Motif ${MOTIFS.length + 1}`;
  MOTIFS.push({ name, cells });
  try { localStorage.setItem('pkMotifs', JSON.stringify(MOTIFS)); } catch(e) {}
  buildMotifPal();
  showHint(`Saved as "${name}"`);
}

function stampMotif(motif) {
  snap();
  const tc = BORDER + (S.cols - 2 * BORDER) / 2;
  const tr = BORDER + (S.rows - 2 * BORDER) / 2;
  for (const [key, color] of Object.entries(motif.cells)) {
    const p = key.split(',');
    const c = Math.round(tc + +p[0]);
    const r = Math.round(tr + +p[1]);
    if (!isInner(c, r)) continue;
    S.cells[`${c},${r},${p[2]}`] = color;
  }
  render();
  showHint(`Placed "${motif.name}"`);
}

function deleteMotif(idx) {
  MOTIFS.splice(idx, 1);
  try { localStorage.setItem('pkMotifs', JSON.stringify(MOTIFS)); } catch(e) {}
  buildMotifPal();
}

function buildMotifPal() {
  const el = document.getElementById('motif-pal');
  el.innerHTML = '';
  if (!MOTIFS.length) return;

  MOTIFS.forEach((motif, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'motif-thumb';

    // thumbnail canvas (60×60 physical px)
    const tc    = document.createElement('canvas');
    const TPX   = 60;
    tc.width     = TPX; tc.height = TPX;
    const tctx  = tc.getContext('2d');
    const keys  = Object.keys(motif.cells);

    if (keys.length) {
      const dcs  = keys.map(k => +k.split(',')[0]);
      const drs  = keys.map(k => +k.split(',')[1]);
      const minDC = Math.min(...dcs), maxDC = Math.max(...dcs);
      const minDR = Math.min(...drs), maxDR = Math.max(...drs);
      const spanC = maxDC - minDC + 1, spanR = maxDR - minDR + 1;
      const tCell = Math.max(1, Math.floor((TPX - 4) / Math.max(spanC, spanR)));
      const offX  = (TPX - spanC * tCell) / 2;
      const offY  = (TPX - spanR * tCell) / 2;

      tctx.fillStyle = '#1c0508';
      tctx.fillRect(0, 0, TPX, TPX);

      for (const [key, color] of Object.entries(motif.cells)) {
        const p  = key.split(',');
        const dc = +p[0] - minDC, dr = +p[1] - minDR, tri = p[2];
        const x  = offX + dc * tCell, y = offY + dr * tCell;
        const mx = x + tCell / 2,     my = y + tCell / 2;
        tctx.fillStyle = color;
        tctx.beginPath();
        if      (tri==='t') { tctx.moveTo(x,y);        tctx.lineTo(x+tCell,y);        tctx.lineTo(mx,my); }
        else if (tri==='r') { tctx.moveTo(x+tCell,y);  tctx.lineTo(x+tCell,y+tCell);  tctx.lineTo(mx,my); }
        else if (tri==='b') { tctx.moveTo(x+tCell,y+tCell); tctx.lineTo(x,y+tCell);   tctx.lineTo(mx,my); }
        else                { tctx.moveTo(x,y+tCell);  tctx.lineTo(x,y);              tctx.lineTo(mx,my); }
        tctx.closePath(); tctx.fill();
      }
    }

    tc.addEventListener('click', () => stampMotif(motif));
    tc.title = `Click to stamp "${motif.name}"`;

    const del = document.createElement('button');
    del.className = 'm-del'; del.textContent = '×';
    del.addEventListener('click', e => { e.stopPropagation(); deleteMotif(idx); });

    const lbl = document.createElement('div');
    lbl.className = 'm-lbl'; lbl.textContent = motif.name;

    wrap.appendChild(tc); wrap.appendChild(del); wrap.appendChild(lbl);
    el.appendChild(wrap);
  });
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
buildTools();
buildThreadPal();
buildBasePal();
buildSym();
buildMotifPal();
initCanvas();
window.addEventListener('resize', initCanvas);
</script>
